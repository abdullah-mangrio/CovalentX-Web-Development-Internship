<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe | AI Mode</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="game-container">
    <section class="game-card">
      <p class="badge">Task 02 • Web Development Internship</p>
      <h1>Tic Tac Toe</h1>
      <p class="subtitle">Play against another player or challenge the AI opponent.</p>

      <div class="mode-selector">
        <button class="mode-btn active" data-mode="pvp">Player vs Player</button>
        <button class="mode-btn" data-mode="ai">Player vs AI</button>
      </div>

      <div class="scoreboard">
        <div class="score-box">
          <h2 id="xScore">0</h2>
          <p>Player X</p>
        </div>
        <div class="score-box">
          <h2 id="oScore">0</h2>
          <p id="oLabel">Player O</p>
        </div>
      </div>

      <div class="status" id="status">Player X's Turn</div>

      <div class="board" id="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>

      <div class="actions">
        <button id="resetBtn">Reset Round</button>
        <button id="newGameBtn">New Game</button>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
